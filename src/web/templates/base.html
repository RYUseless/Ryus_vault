<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ryus Vault{% endblock %}</title>
    <style nonce="{{ g.csp_nonce }}">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --card: #111111;
            --text: #f9fafb;
            --muted: #9ca3af;
            --border: #262626;
            --danger: #ef4444;
            --radius-lg: 12px;
            --radius-md: 8px;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 100%;
            max-width: 420px;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text);
            font-size: 0.9375rem;
            font-family: inherit;
            margin-bottom: 0.75rem;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: #555;
        }

        button {
            padding: 0.75rem 1.25rem;
            background: var(--text);
            color: var(--bg);
            border: none;
            border-radius: 999px;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.1s;
        }

        button:hover {
            background: #d4d4d4;
        }

        .error {
            color: var(--danger);
            font-size: 0.8125rem;
            margin-top: 0.25rem;
            display: none;
        }

        .link {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8125rem;
            color: var(--muted);
        }

        .link a {
            color: var(--text);
            text-decoration: none;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
